<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#eff1f3"/>
  <rect x="50" y="50" width="1300" height="800" rx="28" fill="#fbfbfc" stroke="#24333b" stroke-width="6"/>
  <text x="90" y="120" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#24333b">Wearable Shell Preview Sheet</text>
  <text x="90" y="160" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#55646c">Simplified public schematic • cosmetic enclosure direction only</text>
  <rect x="90" y="220" width="560" height="500" rx="24" fill="#e9edf0" stroke="#24333b" stroke-width="4"/>
  <rect x="740" y="220" width="520" height="500" rx="24" fill="#f1ebe3" stroke="#24333b" stroke-width="4"/>
  <path d="M220 520 C240 360 360 300 470 320 C560 340 600 410 610 480 C620 560 570 620 470 640 C350 665 260 630 220 520 Z" fill="#24333b"/>
  <rect x="330" y="470" width="210" height="64" rx="18" fill="#ab6f52"/>
  <text x="130" y="280" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#24333b">Silhouette Direction</text>
  <text x="130" y="330" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#55646c">Public notes keep the aesthetic direction visible without publishing the full shell source chain.</text>
  <text x="780" y="280" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#24333b">Constraint Summary</text>
  <text x="780" y="340" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#24333b">• No hard projectile path</text>
  <text x="780" y="385" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#24333b">• No compressed air system</text>
  <text x="780" y="430" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#24333b">• No sharp tip or grappling use</text>
  <text x="780" y="475" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#24333b">• Bench mechanism published separately for real fit and travel checks</text>
  <text x="780" y="575" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#55646c">This sheet is a schematic placeholder for visual context, not a safety claim and not a manufacturing drawing.</text>
</svg>
