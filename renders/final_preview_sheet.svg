<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f2efe6"/>
  <rect x="50" y="50" width="1300" height="800" rx="28" fill="#fffdf8" stroke="#1f2d2a" stroke-width="6"/>
  <text x="90" y="120" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#1f2d2a">Bench Mechanism Preview Sheet</text>
  <text x="90" y="160" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#45524f">Low-force wearable launcher study • bench-track public snapshot</text>
  <rect x="90" y="210" width="520" height="270" rx="20" fill="#e5ece7" stroke="#1f2d2a" stroke-width="4"/>
  <rect x="720" y="210" width="540" height="270" rx="20" fill="#ece6dd" stroke="#1f2d2a" stroke-width="4"/>
  <rect x="90" y="530" width="1170" height="250" rx="20" fill="#f7f1e8" stroke="#1f2d2a" stroke-width="4"/>
  <text x="120" y="255" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2d2a">Side Layout</text>
  <text x="120" y="295" font-family="Courier New, monospace" font-size="22" fill="#1f2d2a">rail carriage</text>
  <rect x="180" y="320" width="290" height="34" rx="10" fill="#1f2d2a"/>
  <rect x="470" y="307" width="82" height="62" rx="12" fill="#6e7f78"/>
  <line x1="150" y1="390" x2="560" y2="390" stroke="#9b5d41" stroke-width="12"/>
  <text x="120" y="430" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#45524f">Bench geometry kept simple for repeatable fit and travel checks.</text>
  <text x="750" y="255" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2d2a">Top View</text>
  <rect x="800" y="320" width="360" height="86" rx="18" fill="#1f2d2a"/>
  <rect x="920" y="292" width="120" height="142" rx="18" fill="#9b5d41"/>
  <text x="750" y="470" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#45524f">Mounting zones remain visible instead of hiding impossible fastener paths.</text>
  <text x="120" y="575" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2d2a">Notes</text>
  <text x="120" y="625" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2d2a">• Focus: tolerances, carriage travel, mounting access</text>
  <text x="120" y="665" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2d2a">• Explicitly out of scope: projectiles, pressure systems, body-weight loading</text>
  <text x="120" y="705" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2d2a">• Public repo exposes bench mechanism source, not the full wearable shell dependency chain</text>
</svg>
