name: Repository Checks

on: [push, pull_request]

permissions:
  contents: read

jobs:
  docs-and-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Validate referenced files
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          readme = root / "README.md"
          text = readme.read_text(encoding="utf-8")
          required = [
              root / "docs" / "constraints.md",
              root / "docs" / "ai-workflow.md",
              root / "docs" / "lessons-learned.md",
              root / "openscad" / "bench_mechanism_v3.scad",
              root / "openscad" / "bench_mechanism_v3_render_scene.scad",
              root / "renders" / "final_preview_sheet.png",
              root / "renders" / "cosmetic_shell_v2_1_preview_sheet.png",
          ]
          missing = [str(path) for path in required if not path.exists()]
          markdown_links = re.findall(r"\]\((\./[^)]+)\)", text)
          missing.extend(link for link in markdown_links if not (root / link[2:]).exists())
          if missing:
              for item in missing:
                  print(f"missing: {item}")
              sys.exit(1)
          PY
